<svg xmlns="http://www.w3.org/2000/svg" width="2100" height="760" viewBox="0 0 2100 760">
  <style>
    .sheet { fill: #efe5d2; }
    .title { fill: #161816; font: 800 34px Arial, sans-serif; }
    .note { fill: #555955; font: 500 17px Arial, sans-serif; }
    .caption { fill: #2f2924; font: 800 22px Arial, sans-serif; }
    .accent { fill: none; opacity: .28; stroke: var(--accent); stroke-linejoin: round; stroke-width: 11; }
    .outer { fill: #fffdf7; stroke: #161816; stroke-linejoin: round; stroke-width: 4; }
    .major { stroke: var(--accent); stroke-width: 2.2; }
    .minor { stroke: #161816; stroke-width: 2; }
    .guide { stroke: rgba(85, 89, 85, .58); stroke-dasharray: 8 10; stroke-width: 1.6; }
    .badge { fill: #f0eadc; stroke: var(--variant); stroke-width: 1.3; }
    .title-text { fill: #161816; font: 800 34px Arial, sans-serif; }
    .small { fill: #555955; font: 500 14px Arial, sans-serif; }
    .art { fill: #555955; font: 800 24px Arial, sans-serif; }
    .row { fill: #161816; font: 900 28px Arial, sans-serif; }
    .row-copy { fill: #161816; font: 900 27px Arial, sans-serif; }
    .cost { fill: #161816; font: 900 21px Arial, sans-serif; }
    .effect-head { fill: #161816; font: 900 20px Arial, sans-serif; }
    .effect { fill: #161816; font: 500 20px Arial, sans-serif; }
    .score-label { fill: #6f624f; font: 900 14px Arial, sans-serif; }
    .score-value { fill: #161816; font: 900 31px Arial, sans-serif; }
    .special-info { fill: #161816; font: 800 24px Arial, sans-serif; }
    .special-effect { fill: #161816; font: 500 26px Arial, sans-serif; }
  </style>
  <rect class="sheet" width="2100" height="760"/>
